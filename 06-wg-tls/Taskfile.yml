
version: '3'

vars:
  ROOT_DOMAIN_VAR: wuhanstudio.click
  ACME_PATH_VAR:   /data/acme
  WG_PORT_VAR: 31820
  WG_DATA_VAR: /mnt/wg-easy
env:
  ROOT_DOMAIN: '{{.ROOT_DOMAIN_VAR}}'
  WG_PORT: '{{.WG_PORT_VAR}}'
  WG_DATA: '{{.WG_DATA_VAR}}'

tasks:
  status:
    desc: Check installation status
    cmds:
      - kubectl get all -n wg-easy
      - kubectl get pvc -n wg-easy
      - kubectl get pv -n wg-easy
      - kubectl get ingress
      - kubectl logs deployment.apps/traefik -n kube-system
      - kubectl exec -n kube-system deploy/traefik -- cat {{.ACME_PATH_VAR}}/acme.json | grep {{.ROOT_DOMAIN_VAR}}

  wg:
    desc: Deploy wg-eazy application at wg.{{.ROOT_DOMAIN_VAR}}
    cmds:
      - sudo mkdir -p {{.WG_DATA_VAR}} && sudo chmod 777 {{.WG_DATA_VAR}}
      - envsubst < wg-app.yml | kubectl apply -f -
      - HOSTNAME=`hostname` envsubst < wg-volume.yml | kubectl apply -f -
      - kubectl apply -f wg-volume-claim.yml
      - envsubst < wg-ingress.yml | kubectl apply -f -
      - kubectl patch pv wg-easy-pv --type=merge -p "$(cat wg-pv-patch.json)"

  wg-tls:
    desc: Install tls certificate for wg-eazy application
    cmds:
      - envsubst < wg-tls-ingress.yml | kubectl apply -f -

  uninstall:
    desc: Uninstall wg-eazy application
    cmds:
      - envsubst < wg-ingress.yml | kubectl delete -f -
      - envsubst < wg-tls-ingress.yml | kubectl delete -f -
      - envsubst < wg-app.yml | kubectl delete -f -
      - HOSTNAME=`hostname` envsubst < wg-volume.yml | kubectl delete -f -
